<!doctype html>
<html lang="en">

<head>
  <script>
    (function() {
      const saved = localStorage.getItem('theme') || 'system';
      document.documentElement.setAttribute('data-theme', saved);
      const isDark = saved === 'dark' || (saved === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="https://api.dicebear.com/7.x/shapes/svg?seed=BookBridge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookBridge - Academic Resource Exchange</title>
  <!-- Google Fonts: Outfit and Inter -->

    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>
